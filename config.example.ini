[server]
# 监听地址。仅绑定内网 IP 或 127.0.0.1 + 反向代理
listen = :8443

[auth]
# HMAC-SHA256 签名密钥，至少 32 字符
jwt_secret = CHANGE-ME-TO-A-RANDOM-STRING-AT-LEAST-32-CHARS
# token 管理持久化文件
token_db = tokens.json

[sign]
# signtool.exe 完整路径
signtool_path = C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe
# raw-sign.exe 路径 (XMLDSIG 签名使用)
raw_sign_path = C:\raw-sign.exe
# 公钥证书 (.cer DER 格式)
cert_path = C:\certs\code-signing.cer

# eToken CSP 名称 (SafeNet)
csp_name = eToken Base Cryptographic Provider

# eToken 容器标识 (含密码)
# 格式: [<token-password>]=<container-name>
csp_key = [SafeNet eToken 5110+ FIPS 0{{password}}]=p11#container_id

# 时间戳服务器 (Fallback 全量签名时使用)
timestamp_url = http://timestamp.digicert.com

# 签名超时 (秒)
sign_timeout = 120

# 临时文件目录
temp_dir = C:\codesign-tmp

# Digest 模式开关
# 首次部署设为 false，运行 verify-ds 验证通过后改为 true
digest_mode = false
