name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          mkdir -p bin

          # Windows amd64
          GOOS=windows GOARCH=amd64 go build \
            -ldflags="-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o bin/codesign-${{ steps.version.outputs.VERSION }}-windows-amd64.exe \
            ./cmd/codesign/

          # macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o bin/codesign-${{ steps.version.outputs.VERSION }}-darwin-arm64 \
            ./cmd/codesign/

          # macOS amd64 (Intel)
          GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o bin/codesign-${{ steps.version.outputs.VERSION }}-darwin-amd64 \
            ./cmd/codesign/

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o bin/codesign-${{ steps.version.outputs.VERSION }}-linux-amd64 \
            ./cmd/codesign/

          # Linux arm64
          GOOS=linux GOARCH=arm64 go build \
            -ldflags="-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o bin/codesign-${{ steps.version.outputs.VERSION }}-linux-arm64 \
            ./cmd/codesign/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          files: |
            bin/codesign-${{ steps.version.outputs.VERSION }}-windows-amd64.exe
            bin/codesign-${{ steps.version.outputs.VERSION }}-darwin-arm64
            bin/codesign-${{ steps.version.outputs.VERSION }}-darwin-amd64
            bin/codesign-${{ steps.version.outputs.VERSION }}-linux-amd64
            bin/codesign-${{ steps.version.outputs.VERSION }}-linux-arm64
